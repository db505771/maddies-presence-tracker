<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Live Status Overlay</title>
    <style>
        :root {
            --bg-dark: #000000; /* Pure black background */
            --overlay-bg: rgba(20, 20, 25, 0.85);
            --color-offline: #71717a;
            --color-online: #3b82f6;
            --color-ingame: #22c55e;
            --text-light: #f4f4f5;
            --text-muted: #71717a;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .live-card {
            width: 450px;
            background: var(--overlay-bg);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
        }

        @keyframes switchFlash {
            0% { border-color: rgba(255,255,255,0.1); box-shadow: 0 0 0px transparent; }
            50% { border-color: var(--color-ingame); box-shadow: 0 0 30px rgba(34, 197, 148, 0.6); }
            100% { border-color: rgba(255,255,255,0.1); box-shadow: 0 0 0px transparent; }
        }

        .live-card.game-changed {
            animation: switchFlash 1.2s ease-in-out;
        }

        .live-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 1.5px;
            display: flex;
            align-items: center;
            gap: 6px;
            text-transform: uppercase;
        }

        .badge-offline { background-color: rgba(113, 113, 122, 0.15); color: var(--color-offline); }
        .badge-online { background-color: rgba(59, 130, 246, 0.15); color: var(--color-online); }
        .badge-ingame { background-color: rgba(34, 197, 94, 0.15); color: var(--color-ingame); }

        .pulse-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .badge-offline .pulse-dot { background-color: var(--color-offline); }
        .badge-online .pulse-dot { background-color: var(--color-online); box-shadow: 0 0 8px var(--color-online); }
        
        .badge-ingame .pulse-dot {
            background-color: var(--color-ingame);
            box-shadow: 0 0 8px var(--color-ingame);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.6; }
            50% { transform: scale(1.2); opacity: 1; box-shadow: 0 0 14px var(--color-ingame); }
            100% { transform: scale(0.9); opacity: 0.6; }
        }

        /* Fixed container dimensions so UI size stays perfectly locked */
        .session-container {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-top: 15px;
            height: 110px; 
        }

        .game-thumbnail {
            width: 110px;
            height: 110px;
            border-radius: 14px;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.05);
            background-color: #18181b;
            display: block; 
        }

        .details {
            flex: 1;
            display: flex;
            flex-direction: column;
            transition: text-align 0.3s ease;
        }

        /* Helper class injected dynamically via JS to center contents */
        .details.centered {
            text-align: center;
            padding-right: 0;
        }

        .status-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .game-name {
            font-size: 1.5rem;
            font-weight: 800;
            margin: 0;
            line-height: 1.2;
            color: var(--text-light);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
        }

        .duration-container {
            margin-top: 20px;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: none;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        .duration-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        .duration-time {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text-light);
            font-variant-numeric: tabular-nums;
        }
    </style>
</head>
<body>

    <div class="live-card" id="overlay-card">
        <div id="status-badge" class="live-badge badge-offline">
            <div class="pulse-dot"></div> <span id="status-text">Offline</span>
        </div>

        <div class="status-label">Roblox Status Tracker</div>
        
        <div class="session-container">
            <img id="display-icon" class="game-thumbnail" src="https://via.placeholder.com/150/18181b/71717a?text=..." alt="Game Icon">
            
            <div id="details-box" class="details">
                <h2 id="display-name" class="game-name">Loading...</h2>
                <span id="display-details" style="font-size: 0.85rem; color: var(--text-muted); margin-top: 4px;">Connecting to micro-API...</span>
            </div>
        </div>

        <div id="duration-wrapper" class="duration-container">
            <span id="duration-label" class="duration-label">Elapsed Time:</span>
            <span id="duration-clock" class="duration-time">00:00:00</span>
        </div>
    </div>

    <script>
        const STATUS_API_URL = "https://script.google.com/macros/s/AKfycbxgmFbWXrwxt6XfS7Ukuii3EWUACmeahD6n2PrGZ1d0qnz8Ndsuf84n6dwIVv92J6k/exec";

        let lastGameId = null;
        let clockifyStartTimestamp = null; 
        let clockInterval = null;

        function updateStopwatch() {
            if (!clockifyStartTimestamp) {
                document.getElementById('duration-clock').innerText = "00:00:00";
                return;
            }
            
            const totalSeconds = Math.floor((Date.now() - clockifyStartTimestamp) / 1000);
            if (totalSeconds < 0) return; 
            
            const hours = Math.floor(totalSeconds / 3600).toString().padStart(2, '0');
            const minutes = Math.floor((totalSeconds % 3600) / 60).toString().padStart(2, '0');
            const seconds = (totalSeconds % 60).toString().padStart(2, '0');
            
            document.getElementById('duration-clock').innerText = `${hours}:${minutes}:${seconds}`;
        }

        function startClock(serverStartTime) {
            clockifyStartTimestamp = serverStartTime;
            updateStopwatch();
            if (!clockInterval) {
                clockInterval = setInterval(updateStopwatch, 1000);
            }
        }

        function stopClock() {
            if (clockInterval) {
                clearInterval(clockInterval);
                clockInterval = null;
            }
            clockifyStartTimestamp = null;
            document.getElementById('duration-clock').innerText = "00:00:00";
        }

        async function syncLiveOverlay() {
            try {
                const response = await fetch(STATUS_API_URL);
                const data = await response.json();
                
                const currentStatus = (data.presence || "Offline").toLowerCase().trim(); 
                
                const badge = document.getElementById('status-badge');
                const statusText = document.getElementById('status-text');
                const nameText = document.getElementById('display-name');
                const detailsText = document.getElementById('display-details');
                const iconImg = document.getElementById('display-icon');
                const durationLabel = document.getElementById('duration-label');
                const durationWrapper = document.getElementById('duration-wrapper');
                const detailsBox = document.getElementById('details-box');

                iconImg.src = data.image;
                nameText.innerText = data.gameName;

                if ((currentStatus === "in game" || currentStatus === "online") && data.startTime) {
                    durationWrapper.style.display = "flex";

                    if (currentStatus === "in game") {
                        iconImg.style.display = "block"; 
                        detailsBox.classList.remove('centered'); // Reset to standard side-by-side flex alignment
                        
                        badge.className = "live-badge badge-ingame";
                        statusText.innerText = "In Game";
                        detailsText.innerText = "Currently playing Roblox";
                        durationLabel.innerText = "Duration:";
                    } else {
                        iconImg.style.display = "none";  
                        detailsBox.classList.add('centered'); // Apply centering rules
                        
                        badge.className = "live-badge badge-online";
                        statusText.innerText = "Online";
                        detailsText.innerText = "Active on the platform";
                        durationLabel.innerText = "Online Time:";
                    }

                    startClock(data.startTime);

                    if (currentStatus === "in game" && lastGameId !== null && lastGameId !== data.gameId) {
                        triggerSwitchAnimation();
                    }
                    lastGameId = data.gameId;

                } else {
                    iconImg.style.display = "none";  
                    detailsBox.classList.add('centered'); // Apply centering rules
                    durationWrapper.style.display = "none";

                    badge.className = "live-badge badge-offline";
                    statusText.innerText = "Offline";
                    detailsText.innerText = "Currently not tracking";
                    
                    stopClock();
                    lastGameId = null;
                }
            } catch (error) {
                console.error("Overlay UI update error:", error);
                document.getElementById('display-name').innerText = "API Offline";
            }
        }

        function triggerSwitchAnimation() {
            const card = document.getElementById('overlay-card');
            card.classList.remove('game-changed');
            void card.offsetWidth; 
            card.classList.add('game-changed');
        }

        syncLiveOverlay();
        setInterval(syncLiveOverlay, 15000); 
    </script>
</body>
</html>
